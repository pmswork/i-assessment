<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ELAN Interpreter Planner{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand__logo">
          <img src="https://ik.imagekit.io/gtngroup/elan/logo/Logo_Elan%20Languages_primary.svg" alt="Elan Languages">
        </span>
        <span class="brand__name">ELAN Planning</span>
        <span class="brand__sub">Interpreter allocation</span>
      </div>

      <nav class="sidebar-nav" aria-label="Sections">
        <div class="sidebar-group">
          <div class="sidebar-group__title">Planning</div>
          <a class="sidebar-link {{ 'is-active' if request.url.path == '/' else '' }}" href="/">Job list</a>
          <a class="sidebar-link {{ 'is-active' if request.url.path.startswith('/interpreters') else '' }}" href="/interpreters">Interpreters</a>
        </div>
        <div class="sidebar-group">
          <div class="sidebar-group__title">Data</div>
          <a class="sidebar-link {{ 'is-active' if request.url.path.startswith('/admin') else '' }}" href="/admin">Admin</a>
          <a class="sidebar-link {{ 'is-active' if request.url.path.startswith('/settings') else '' }}" href="/settings">Settings</a>
        </div>
      </nav>

      <div class="sidebar-meta">
        SQLite-backed session (app.db)<br>
        Auto-assignment does most of the work
      </div>
    </aside>

    <div class="shell-main">
      <div class="app-clock" aria-label="Current date and time in Amstelveen">
        <span id="amstelveen-clock">Amstelveen time</span>
      </div>
      <main class="page">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
  <script>
    function updateAmstelveenClock() {
      var now = new Date();
      var date = new Intl.DateTimeFormat("en-GB", {
        timeZone: "Europe/Amsterdam",
        day: "numeric",
        month: "long",
        year: "numeric"
      }).format(now);
      var time = new Intl.DateTimeFormat("en-GB", {
        timeZone: "Europe/Amsterdam",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(now);
      var target = document.getElementById("amstelveen-clock");
      if (target) target.textContent = date + ", " + time;
    }
    updateAmstelveenClock();
    setInterval(updateAmstelveenClock, 1000);
  </script>
</body>
</html>
